<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - PainSolver</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <style>
    :root {
      --bg: #0a0f14;
      --surface: #141c24;
      --surface-light: #1c2630;
      --text: #e8ecef;
      --text-muted: #8899a6;
      --primary: #004549;
      --primary-light: #006d73;
      --accent: #00eef9;
      --error: #ef4444;
      --success: #10b981;
      --line: #243240;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .brand p {
      color: var(--text-muted);
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: var(--surface-light);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .btn {
      width: 100%;
      padding: 14px 20px;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn:hover { background: var(--primary-light); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-message, .success-message {
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }
    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--error);
      color: var(--error);
    }
    .success-message {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid var(--success);
      color: var(--success);
    }
    .error-message.show, .success-message.show { display: block; }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <h1>Reset Password</h1>
      <p>Choose a new password for your account</p>
    </div>

    <div id="error-message" class="error-message"></div>
    <div id="success-message" class="success-message"></div>

    <form id="reset-form">
      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" minlength="8" required>
      </div>
      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="Re-enter password" required>
      </div>
      <button type="submit" class="btn" id="submit-btn">
        <span class="btn-text">Reset Password</span>
      </button>
    </form>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var token = params.get("token");
    var errorEl = document.getElementById("error-message");
    var successEl = document.getElementById("success-message");
    var form = document.getElementById("reset-form");
    var btn = document.getElementById("submit-btn");

    if (!token) {
      errorEl.textContent = "Invalid reset link. Please request a new one.";
      errorEl.classList.add("show");
      form.style.display = "none";
    }

    form.addEventListener("submit", function(e) {
      e.preventDefault();
      
      var password = document.getElementById("password").value;
      var confirm = document.getElementById("confirm").value;

      if (password !== confirm) {
        errorEl.textContent = "Passwords do not match.";
        errorEl.classList.add("show");
        return;
      }

      errorEl.classList.remove("show");
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';

      fetch("/api/auth/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token: token, password: password })
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.success) {
          successEl.textContent = "Password reset successfully! Redirecting to login...";
          successEl.classList.add("show");
          setTimeout(function() {
            window.location.href = "/auth";
          }, 2000);
        } else {
          errorEl.textContent = data.error || "Reset failed. Please try again.";
          errorEl.classList.add("show");
          btn.disabled = false;
          btn.innerHTML = '<span class="btn-text">Reset Password</span>';
        }
      })
      .catch(function() {
        errorEl.textContent = "Network error. Please try again.";
        errorEl.classList.add("show");
        btn.disabled = false;
        btn.innerHTML = '<span class="btn-text">Reset Password</span>';
      });
    });
  </script>
</body>
</html>
